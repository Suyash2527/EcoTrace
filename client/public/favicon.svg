<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <!-- Gloss highlight -->
  <rect width="64" height="30" rx="16" fill="url(#shimmer)"/>

  <!-- Leaf shape -->
  <path d="M32 14 C32 14 48 20 48 34 C48 44 41 50 32 50 C32 50 32 38 24 30 C18 24 20 16 32 14 Z"
        fill="white" fill-opacity="0.95"/>

  <!-- Stem -->
  <line x1="32" y1="50" x2="32" y2="58" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.8"/>

  <!-- Pulse/trend line through the leaf -->
  <polyline points="22,34 27,34 29,28 31,40 33,30 36,36 42,36"
            fill="none" stroke="#16a34a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>